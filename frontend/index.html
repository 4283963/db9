<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧园区 - 机房机柜监控</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #0a0e27;
    }

    #scene-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvas {
      display: block;
    }

    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      background: linear-gradient(to bottom, rgba(10, 14, 39, 0.9), transparent);
      z-index: 10;
      pointer-events: none;
    }

    .header h1 {
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .header .subtitle {
      color: #7b8ff1;
      font-size: 13px;
      margin-top: 4px;
    }

    .info-panel {
      position: absolute;
      top: 80px;
      right: 20px;
      width: 240px;
      background: rgba(20, 30, 60, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(123, 143, 241, 0.3);
      border-radius: 10px;
      padding: 16px;
      z-index: 10;
      color: #fff;
    }

    .info-panel h3 {
      font-size: 15px;
      margin-bottom: 12px;
      color: #7b8ff1;
      border-bottom: 1px solid rgba(123, 143, 241, 0.3);
      padding-bottom: 8px;
    }

    .cabinet-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 13px;
    }

    .cabinet-list-item .temp {
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    .status-normal {
      color: #4ade80;
    }

    .status-warning {
      color: #f59e0b;
    }

    .tooltip {
      position: absolute;
      background: rgba(20, 30, 60, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 143, 241, 0.5);
      border-radius: 10px;
      padding: 16px 20px;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 100;
      min-width: 200px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid rgba(123, 143, 241, 0.5);
    }

    .tooltip h4 {
      font-size: 15px;
      margin-bottom: 10px;
      color: #7b8ff1;
    }

    .tooltip .temp-value {
      font-size: 32px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      margin: 6px 0;
    }

    .tooltip .temp-label {
      font-size: 12px;
      color: #94a3b8;
    }

    .tooltip .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 8px;
    }

    .tooltip .status-badge.normal {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }

    .tooltip .status-badge.warning {
      background: rgba(245, 158, 11, 0.2);
      color: #f59e0b;
    }

    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: #7b8ff1;
      font-size: 12px;
      background: rgba(20, 30, 60, 0.7);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(123, 143, 241, 0.2);
      z-index: 10;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #7b8ff1;
      font-size: 16px;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="scene-container">
    <canvas id="canvas"></canvas>

    <div class="header">
      <h1>智慧园区 · 机房监控中心</h1>
      <div class="subtitle">Smart Park Data Center Monitoring</div>
    </div>

    <div class="info-panel">
      <h3>机柜温度概览</h3>
      <div id="cabinet-list">
        <div class="cabinet-list-item">加载中...</div>
      </div>
    </div>

    <div class="controls">
      🖱️ 左键拖动旋转 · 滚轮缩放 · 点击机柜查看详情
    </div>

    <div class="tooltip" id="tooltip">
      <h4 id="tooltip-title">机柜 1</h4>
      <div class="temp-label">当前温度</div>
      <div class="temp-value" id="tooltip-temp">--°C</div>
      <span class="status-badge normal" id="tooltip-status">正常</span>
    </div>

    <div class="loading" id="loading">加载中...</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="./app.js"></script>
</body>
</html>
